<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SkillHub</title>
    <link rel="icon" href="assets/logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="container">
            <div class="logo"><a href="index.html"><img src="assets/logo.jpg" alt="SkillHub logo"><span>SkillHub</span></a></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="profile.html">Profile</a>
                <a href="messages.html">Messages</a>
                <a href="contact.html">Contact Us</a>
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </div>
        </div>
    </div>

    <div class="container contact-container">
        <h2>Contact Us - Customer Service</h2>
        
        <div class="contact-info">
            <div class="contact-card">
                <h3>📞 Phone Number</h3>
                <p><a href="tel:09015210112">09015210112</a></p>
            </div>

            <div class="contact-card">
                <h3>📧 Email Address</h3>
                <p><a href="mailto:skill.hub.gtt@gmail.com">skill.hub.gtt@gmail.com</a></p>
            </div>

            <div class="contact-card">
                <h3>💬 WhatsApp</h3>
                <p><a href="https://wa.me/09015210112" target="_blank">Chat on WhatsApp</a></p>
            </div>
        </div>

        <div class="contact-form">
            <h3>Send us a Message</h3>
            <form id="contactForm">
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" name="subject" required>
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            alert('Thank you for your message. Our customer service team will get back to you soon at your registered email or phone number.');
            
            // Clear form
            document.getElementById('contactForm').reset();
        });
    </script>
</body>
</html>
